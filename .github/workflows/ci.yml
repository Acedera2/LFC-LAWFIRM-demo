name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Safe Prisma generate (server)
        run: npm --prefix server run prisma:generate:safe || echo "prisma generate safe failed, continuing"

      - name: Start demo server
        run: |
          npm --prefix server run dev:demo &
          for i in {1..30}; do
            if curl -sSf http://localhost:5000/health > /dev/null 2>&1; then
              echo "demo server ready";
              break;
            fi
            sleep 1;
          done

      - name: Run lint
        run: npm run lint

      - name: Run smoke tests (cookies)
        run: npm run smoke:demo:cookies

      - name: Run smoke tests (roles)
        run: npm run smoke:demo
