name: E2E Playwright

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm ci --prefix client
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: ./client
      - name: Start dev server
        run: npm --prefix client run dev &
      - name: Wait for server
        run: npx wait-on http://127.0.0.1:5174 || true
      - name: Run Playwright tests
        run: |
          set -e
          npm --prefix client run test:e2e || true
      - name: Install ffmpeg (for GIF conversion)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg || true
      - name: Convert Playwright videos to GIFs
        run: |
          mkdir -p client/demo/gifs || true
          find client/test-results -type f \( -iname "*.mp4" -o -iname "*.webm" \) -print0 | while IFS= read -r -d '' file; do
            gif="client/demo/gifs/$(basename "${file%.*}").gif"
            echo "Converting $file -> $gif"
            ffmpeg -y -i "$file" -vf "scale=640:-1:flags=lanczos,fps=15" -r 15 "$gif" || true
          done
      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            client/playwright-report/**
            client/test-results/**
            client/demo/**
            client/tests/e2e/**/trace.zip
